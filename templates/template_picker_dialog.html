
<style>
*{box-sizing:border-box}
.dialog{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.dialog-header{padding:16px 20px 0;border-bottom:.5px solid var(--color-border-tertiary);padding-bottom:14px}
.dialog-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin:0 0 12px}
.filter-bar{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:3px 10px;border-radius:20px;border:.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:12px;transition:all .12s}
.chip.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.grid-area{padding:14px 20px;max-height:480px;overflow-y:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);cursor:pointer;transition:border-color .12s;overflow:hidden;user-select:none}
.card:hover{border-color:var(--color-border-secondary)}
.card.selected{border:2px solid var(--color-border-info);background:var(--color-background-info)}
.card.blank{display:flex;align-items:center;justify-content:center;min-height:112px;flex-direction:column;gap:6px}
.card.blank .blank-icon{width:28px;height:28px;border-radius:6px;border:.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center}
.card.blank.selected .blank-icon{border-color:var(--color-border-info)}
.card-preview{border-bottom:.5px solid var(--color-border-tertiary);background:var(--color-background-tertiary);padding:8px 10px 6px}
.card.selected .card-preview{background:var(--color-background-info);border-color:var(--color-border-info)}
.card-preview svg{width:100%;height:auto;display:block}
.card-body{padding:8px 10px}
.card-name{font-size:12px;font-weight:500;color:var(--color-text-primary);margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-eg{font-size:11px;color:var(--color-text-tertiary);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.selected .card-name{color:var(--color-text-info)}
.dialog-footer{padding:12px 20px;border-top:.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
.footer-hint{font-size:12px;color:var(--color-text-tertiary)}
.footer-actions{display:flex;gap:8px}
.btn{padding:6px 14px;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;border:.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn-primary:hover{opacity:.88;background:var(--color-text-primary)}
.btn-primary:disabled{opacity:.35;cursor:default}
</style>

<div class="dialog">
  <div class="dialog-header">
    <p class="dialog-title">Choose a template</p>
    <div class="filter-bar">
      <button class="chip active" onclick="flt(this,'all')">All</button>
      <button class="chip" onclick="flt(this,'app')">App shells</button>
      <button class="chip" onclick="flt(this,'util')">Utility</button>
      <button class="chip" onclick="flt(this,'mktg')">Marketing</button>
    </div>
  </div>
  <div class="grid-area">
    <div class="grid" id="grid"></div>
  </div>
  <div class="dialog-footer">
    <span class="footer-hint" id="hint">No template selected</span>
    <div class="footer-actions">
      <button class="btn">Cancel</button>
      <button class="btn btn-primary" id="confirm-btn" disabled onclick="confirm()">Use template</button>
    </div>
  </div>
</div>

<script>
const W=120,H=76;
const WF={
"none":[],
"sidebar-content":[[0,0,26,H,"C"],[26,0,94,11,"C"],[2,5,17,3,"L",1],[2,14,14,2,"T",1],[2,20,15,2,"T",1],[2,26,12,2,"T",1],[30,15,52,4,"L",1],[30,24,62,2,"T",1],[30,29,54,2,"T",1],[30,36,32,22,"S",2],[66,36,34,22,"S",2]],

"canvas-workspace":[[0,0,W,11,"C"],[0,11,14,H-11,"C"],[92,11,28,H-11,"C"],[2,15,10,6,"T",1],[2,25,10,6,"T",1],[2,35,10,6,"T",1],[18,18,38,22,"S",2],[42,44,30,18,"S",2],[95,16,22,3,"T",1],[95,22,22,7,"S",1],[95,34,16,3,"T",1],[95,39,22,7,"S",1]],
"feed":[[0,0,W,11,"C"],[6,3.5,14,4,"L",1],[18,14,84,14,"S",2],[18,32,84,14,"S",2],[18,50,84,14,"S",2],[22,17,44,3,"L",1],[22,22,36,2,"T",1],[22,35,48,3,"L",1],[22,40,38,2,"T",1],[22,53,42,3,"L",1],[22,58,32,2,"T",1]],
"data-grid":[[0,0,W,11,"C"],[6,3.5,18,4,"L",1],[4,14,112,8,"C"],[4,22,112,.5,"T"],[4,30,112,.5,"T"],[4,38,112,.5,"T"],[4,46,112,.5,"T"],[4,54,112,.5,"T"],[35,14,.5,48,"T"],[65,14,.5,48,"T"],[95,14,.5,48,"T"],[7,16,22,3,"L",1],[38,16,20,3,"L",1],[68,16,18,3,"L",1],[98,16,14,3,"L",1]],
"split-input":[[0,0,W,11,"C"],[6,3.5,14,4,"L",1],[61.5,11,.5,H-11,"T"],[63,11,57,H-11,"S"],[4,17,50,2,"T",1],[4,22,42,2,"T",1],[4,27,48,2,"T",1],[4,32,36,2,"T",1],[4,37,44,2,"T",1],[65,17,44,5,"L",1],[65,26,44,2,"T",1],[65,31,38,2,"T",1],[65,36,42,2,"T",1],[65,43,44,12,"C",1]],
"chat-conversation":[[0,0,28,H,"C"],[1,8,26,9,"S",1],[1,20,26,9,"T",1],[1,32,26,9,"T",1],[3,11,16,2,"L",1],[3,23,14,2,"T",1],[55,13,52,11,"S",2],[30,27,52,11,"C",2],[58,42,48,11,"S",2],[30,56,46,10,"C",2],[30,68,86,8,"S",2]],
"settings":[[0,0,30,H,"C"],[3,6,24,4,"L",1],[3,15,20,3,"T",1],[3,22,22,3,"T",1],[3,29,18,3,"T",1],[3,36,21,3,"T",1],[36,7,38,5,"L",1],[36,19,24,2,"T",1],[36,24,76,8,"S",1],[36,37,20,2,"T",1],[36,42,76,8,"S",1],[36,55,18,2,"T",1],[36,60,76,8,"S",1]],
"wizard":[[30,6,20,5,"L",2],[54,6,20,5,"T",2],[78,6,20,5,"T",2],[16,15,88,50,"S",3],[24,22,46,5,"L",1],[24,32,24,2,"T",1],[24,37,72,8,"C",1],[24,50,18,2,"T",1],[24,55,72,8,"C",1],[40,68,40,8,"L",2]],
"auth":[[0,0,W,H,"C"],[24,9,72,58,"S",3],[44,15,32,7,"L",1],[30,27,60,7,"C",1],[30,37,60,7,"C",1],[30,48,60,9,"L",2],[34,60,52,2,"T",1]],
"inbox":[[0,0,28,H,"C"],[2,6,24,5,"L",1],[2,16,24,3,"T",1],[2,23,24,3,"T",1],[2,30,24,3,"T",1],[29,2,44,13,"S",1],[29,17,44,12,"T",1],[29,31,44,12,"T",1],[29,45,44,12,"T",1],[33,5,26,3,"L",1],[33,10,18,2,"T",1],[75,0,45,H,"S"],[79,7,36,5,"L",1],[79,17,32,2,"T",1],[79,22,28,2,"T",1],[79,62,32,9,"L",2]],
"modal-overlay":[[0,0,W,H,"D"],[20,12,80,52,"S",3],[20,12,80,14,"C",3],[26,17,44,5,"L",1],[26,32,60,2,"T",1],[26,38,50,2,"T",1],[26,44,54,2,"T",1],[58,53,34,8,"L",2]],
"split-browser":[[0,0,W,11,"C"],[6,3.5,20,4,"L",1],[61.5,11,.5,H-11,"T"],[63,11,45,H-11,"S"],[108,11,12,H-11,"C"],[4,17,50,4,"L",1],[4,25,50,2,"T",1],[4,30,42,2,"T",1],[4,35,48,2,"T",1],[66,17,36,4,"L",1],[66,25,36,2,"T",1],[66,30,32,2,"T",1],[110,18,8,4,"T",1],[110,27,8,4,"T",1],[110,36,8,4,"T",1]],
"landing":[[0,0,W,12,"C"],[6,4,18,4.5,"L",1],[58,5,10,2.5,"T",1],[72,5,10,2.5,"T",1],[86,5,10,2.5,"T",1],[26,17,68,6,"L",1],[32,27,56,3,"T",1],[40,33,40,8,"L",2],[4,46,34,26,"S",2],[42,46,34,26,"S",2],[80,46,36,26,"S",2]],
"empty-error":[[0,0,W,11,"C"],[6,4,14,4,"L",1],[38,16,44,24,"S",3],[42,18,36,12,"C",2],[32,44,56,5,"L",1],[26,53,68,3,"T",1],[26,58,58,3,"T",1],[40,65,40,9,"L",2]],
"simple-app":[[30,14,60,48,"S",3],[42,20,36,5,"L",1],[38,30,44,8,"C",2],[46,42,28,8,"L",2],[50,54,20,4,"L",1]]
};

const TEMPLATES=[
  {id:"none",name:"No template",group:"all",desc:"Start from scratch",examples:[]},
  {id:"sidebar-content",name:"Sidebar + content",group:"app",desc:"Nav rail + main content",examples:["Notion","Linear","Slack"]},
  {id:"topnav-content",name:"Top nav + content",group:"app",desc:"Full-width nav + content below",examples:["GitHub","Stripe","Vercel"]},
  {id:"dashboard",name:"Dashboard",group:"app",desc:"Metrics, charts, activity",examples:["Mixpanel","Datadog","Vercel"]},
  {id:"master-detail",name:"Master-detail",group:"app",desc:"List left, detail right",examples:["Gmail","Finder","Apple Mail"]},
  {id:"canvas-workspace",name:"Canvas / workspace",group:"app",desc:"Infinite canvas + toolbars",examples:["Figma","Miro","Excalidraw"]},
  {id:"feed",name:"Feed / timeline",group:"app",desc:"Scrollable item column",examples:["Twitter/X","Slack channel"]},
  {id:"data-grid",name:"Table / data grid",group:"app",desc:"Dense rows + filter toolbar",examples:["Airtable","Sheets","Retool"]},
  {id:"split-input",name:"Split input / preview",group:"app",desc:"Editor left, preview right",examples:["CodePen","StackBlitz"]},
  {id:"chat-conversation",name:"Chat / conversation",group:"app",desc:"Message thread + composer",examples:["Claude","ChatGPT","Intercom"]},
  {id:"settings",name:"Settings / profile",group:"util",desc:"Section nav + form pane",examples:["GitHub","Stripe","Notion"]},
  {id:"wizard",name:"Wizard / multi-step",group:"util",desc:"Stepped flow + progress bar",examples:["Onboarding","Checkout"]},
  {id:"auth",name:"Auth screens",group:"util",desc:"Centered card, minimal chrome",examples:["Login","Signup","Reset"]},
  {id:"inbox",name:"Inbox",group:"util",desc:"Actionable item list + panel",examples:["Linear","Superhuman"]},
  {id:"modal-overlay",name:"Modal / overlay",group:"util",desc:"Dialog or command palette",examples:["⌘K palette","Confirm dialog"]},
  {id:"split-browser",name:"Split browser",group:"util",desc:"Source pane + result pane",examples:["Perplexity","Cursor","v0"]},
  {id:"landing",name:"Landing page",group:"mktg",desc:"Hero + sections + CTAs",examples:["SaaS home","Product launch"]},
  {id:"empty-error",name:"Empty / error state",group:"mktg",desc:"Full-page fallback state",examples:["404","Empty inbox"]},
  {id:"simple-app",name:"Simple app",group:"util",desc:"Centered card, single tool",examples:["Counter","Timer","Converter"]}
];

const dark=()=>window.matchMedia("(prefers-color-scheme: dark)").matches;
const S={
  C:()=>dark()?"fill:#2c2c2a":"fill:#d3d1c7",
  S:()=>dark()?"fill:#3d3d3a;stroke:#5f5e5a;stroke-width:.5":"fill:#fff;stroke:#d3d1c7;stroke-width:.5",
  L:()=>dark()?"fill:rgba(255,255,255,.35)":"fill:rgba(0,0,0,.28)",
  T:()=>dark()?"fill:rgba(255,255,255,.12)":"fill:rgba(0,0,0,.1)",
  D:()=>dark()?"fill:rgba(0,0,0,.6)":"fill:rgba(0,0,0,.38)"
};

function makeSVG(id){
  if(id==="none") return "";
  const rects=(WF[id]||[]).map(r=>{
    const[x,y,w,h,s,rx=0]=r;
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" style="${S[s]()}"/>`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="border-radius:4px 4px 0 0">${rects}</svg>`;
}

let current="all", selected=null;

function flt(btn,g){
  current=g;
  document.querySelectorAll(".chip").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function pick(id){
  selected=id;
  render();
}

function confirm(){
  const t=TEMPLATES.find(t=>t.id===selected);
  if(t) sendPrompt(t.id==="none"?"No template selected — start from scratch.":"Template selected: "+t.name+" (id: "+t.id+")");
}

function render(){
  const items=TEMPLATES.filter(t=>t.id==="none"||(current==="all"||t.group===current));
  const btn=document.getElementById("confirm-btn");
  const hint=document.getElementById("hint");
  if(selected){
    const t=TEMPLATES.find(t=>t.id===selected);
    hint.textContent=t.id==="none"?"No template — blank start":"Selected: "+t.name;
    btn.disabled=false;
  } else {
    hint.textContent="No template selected";
    btn.disabled=true;
  }

  document.getElementById("grid").innerHTML=items.map(t=>{
    const sel=selected===t.id;
    if(t.id==="none") return `
      <div class="card blank${sel?" selected":""}" onclick="pick('none')">
        <div class="blank-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="card-body" style="text-align:center;padding-top:4px">
          <p class="card-name" style="white-space:normal">No template</p>
          <p class="card-eg">Start from scratch</p>
        </div>
      </div>`;
    return `
      <div class="card${sel?" selected":""}" onclick="pick('${t.id}')">
        <div class="card-preview">${makeSVG(t.id)}</div>
        <div class="card-body">
          <p class="card-name">${t.name}</p>
          <p class="card-eg">${t.examples.slice(0,2).join(", ")}</p>
        </div>
      </div>`;
  }).join("");
}

render();
</script>
